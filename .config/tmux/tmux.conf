set -g @plugin 'tmux-plugins/tpm'

run '~/.config/tmux/plugins/tpm/tpm'

# ── Tmux theme ─────────────────────────────────────────────────────────────
# Match Pi's muted-teal status bar palette.
set -g status-style                "fg=#d4d4d4,bg=#20383b"
set -g message-style               "fg=#d4d4d4,bg=#29464a"
set -g message-command-style       "fg=#d4d4d4,bg=#29464a"
set -g pane-border-style           "fg=#292e42"
set -g pane-active-border-style    "fg=#3c5d60"

# Dim inactive panes slightly so the active pane (terminal default) stands out.
set -g window-style                "bg=#18181f"
set -g window-active-style         "fg=terminal,bg=terminal"

# Left: session name gets a subtle teal panel.
set -g status-left-length 40
set -g status-left  "#[fg=#d4d4d4,bg=#29464a,bold] #S #[fg=#d4d4d4,bg=#20383b,nobold] "

# Right: time + date
set -g status-right-length 60
set -g status-right "#[fg=#808080,bg=#263f42] %Y-%m-%d  #[fg=#d4d4d4,bg=#263f42,bold]%I:%M %p #[fg=#d4d4d4,bg=#20383b,nobold]"

# Windows: backgrounds, rather than bright text, distinguish active state.
set -g window-status-format         "#[fg=#d4d4d4,bg=#29464a] #I #W #[fg=#d4d4d4,bg=#20383b] "
set -g window-status-current-format "#[fg=#d4d4d4,bg=#3c5d60,bold] #I #W #[fg=#d4d4d4,bg=#20383b,nobold] "
set -g window-status-separator      " "

# Split windows using - and |
unbind %
unbind '"'
bind - split-window -v
bind | split-window -h

set -g status-position bottom

# Allow modified keys to be sent to applications (e.g., Shift+Arrow)
set -g extended-keys on
set -g extended-keys-format csi-u

# Enable mouse support
set -g mouse on

# Alt-click to open file paths in Neovim
bind -n M-MouseDown1Pane run-shell -b -t = \
  "~/dotfiles/bin/tmux-nvim-open '#{mouse_word}' '#{mouse_line}' '#{pane_current_path}' '#{session_name}' '#{window_index}' '#{pane_index}'"

# No delay for escape key press
set -sg escape-time 0

# Forward focus events to Neovim so 'autoread' reloads files changed elsewhere
set -g focus-events on

# Increase scrollback buffer size
set -g history-limit 50000

# Vim style pane selection (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt arrows to select panes without prefix
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# Alt h/l to switch windows without prefix
bind -n M-h previous-window
bind -n M-l next-window
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Agent window switcher with prefix + m
bind m display-popup -E -w 50% -h 22 "$HOME/dotfiles/bin/m"

# Kill session with Ctrl+B + q
bind q confirm-before -p "Kill session? (y/n)" kill-session

# Alt+j/k to cycle sessions without prefix
bind -n M-j switch-client -n
bind -n M-k switch-client -p

# Session switcher with Alt-s (centered popup)
bind -n M-s display-popup -E -w 45% -h 50% "$HOME/dotfiles/bin/tmux-switcher"
