set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'odedlaz/tmux-onedark-theme'

set -g @onedark_time_format "%I:%M %p"
set -g @onedark_date_format "%Y-%m-%d"

# Sensible defaults
set -g base-index 1              # Start window numbering at 1
set -g pane-base-index 1         # Start pane numbering at 1
set -g renumber-windows on       # Renumber windows when one is closed
set -g mode-keys vi              # Use vi keys in copy mode

run '~/.config/tmux/plugins/tpm/tpm'

# Split windows using - and | (open in current directory)
unbind %
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set -g status-position top

# Enable mouse support
set -g mouse on

# Increase scrollback buffer size (tmux-sensible sets escape-time)
set -g history-limit 50000

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Shift arrow to switch windows without prefix
bind -n S-Left  previous-window
bind -n S-Right next-window

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Kill session with Ctrl+B + q
bind q confirm-before -p "Kill session? (y/n)" kill-session
