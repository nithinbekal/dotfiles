set -g @plugin 'tmux-plugins/tpm'

run '~/.config/tmux/plugins/tpm/tpm'

# ── TokyoNight theme ────────────────────────────────────────────────────────
set -g status-style                "fg=#c0caf5,bg=#16161e"
set -g message-style               "fg=#c0caf5,bg=#292e42"
set -g message-command-style       "fg=#c0caf5,bg=#292e42"
set -g pane-border-style           "fg=#292e42"
set -g pane-active-border-style    "fg=#7aa2f7"

# Dim inactive panes by muting their default foreground/background colors.
# Use terminal colors for the active pane so it does not inherit window-style.
set -g window-style                "fg=#3b4261,bg=#0f111a"
set -g window-active-style         "fg=terminal,bg=terminal"

# Left: session name
set -g status-left-length 40
set -g status-left  "#[fg=#7aa2f7,bg=#16161e]#[fg=#16161e,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#16161e] "

# Right: time + date
set -g status-right-length 60
set -g status-right "#[fg=#565f89,bg=#16161e] %Y-%m-%d  #[fg=#c0caf5,bold]%I:%M %p "

# Windows
set -g window-status-format         "#[fg=#292e42,bg=#16161e]#[fg=#a9b1d6,bg=#292e42] #I #W #[fg=#292e42,bg=#16161e]"
set -g window-status-current-format "#[fg=#7aa2f7,bg=#16161e]#[fg=#16161e,bg=#7aa2f7,bold] #I #W #[fg=#7aa2f7,bg=#16161e,nobold]"
set -g window-status-separator      " "

# Split windows using - and |
unbind %
unbind '"'
bind - split-window -v
bind | split-window -h

set -g status-position bottom

# Allow modified keys to be sent to applications (e.g., Shift+Arrow)
set -g extended-keys on
set -g extended-keys-format csi-u

# Enable mouse support
set -g mouse on

# Alt-click to open file paths in Neovim
bind -n M-MouseDown1Pane run-shell -b -t = \
  "~/dotfiles/bin/tmux-nvim-open '#{mouse_word}' '#{mouse_line}' '#{pane_current_path}' '#{session_name}' '#{window_index}' '#{pane_index}'"

# No delay for escape key press
set -sg escape-time 0

# Increase scrollback buffer size
set -g history-limit 50000

# Vim style pane selection (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt arrows to select panes without prefix
bind -n M-Left  select-pane -L
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U
bind -n M-Right select-pane -R

# Alt h/l to switch windows without prefix
bind -n M-h previous-window
bind -n M-l next-window
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Agent window switcher with prefix + m
bind m display-popup -E -b rounded -w 50% -h 22 "$HOME/dotfiles/bin/m"

# Kill session with Ctrl+B + q
bind q confirm-before -p "Kill session? (y/n)" kill-session

# Alt+j/k to cycle sessions without prefix
bind -n M-j switch-client -n
bind -n M-k switch-client -p

# Session switcher with Alt-s (centered popup)
bind -n M-s display-popup -E -b rounded -w 45% -h 50% "$HOME/dotfiles/bin/tmux-switcher"
