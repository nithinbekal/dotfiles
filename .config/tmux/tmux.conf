set -g @plugin 'tmux-plugins/tpm'

run '~/.config/tmux/plugins/tpm/tpm'

# ── TokyoNight theme ────────────────────────────────────────────────────────
set -g status-style                "fg=#c0caf5,bg=#16161e"
set -g message-style               "fg=#c0caf5,bg=#292e42"
set -g message-command-style       "fg=#c0caf5,bg=#292e42"
set -g pane-border-style           "fg=#292e42"
set -g pane-active-border-style    "fg=#7aa2f7"

# Left: session name
set -g status-left-length 40
set -g status-left  "#[fg=#16161e,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#16161e]"

# Right: time + date
set -g status-right-length 60
set -g status-right "#[fg=#565f89,bg=#16161e] %Y-%m-%d  #[fg=#c0caf5,bold]%I:%M %p #[fg=#7aa2f7] "

# Windows
set -g window-status-format         "#[fg=#565f89,bg=#16161e]  #I #W  "
set -g window-status-current-format "#[fg=#16161e,bg=#7aa2f7,bold]  #I #W  #[fg=#7aa2f7,bg=#16161e]"
set -g window-status-separator      ""

# Split windows using - and |
unbind %
unbind '"'
bind - split-window -v
bind | split-window -h

set -g status-position bottom

# Allow modified keys to be sent to applications (e.g., Shift+Arrow)
set -g extended-keys on
set -g extended-keys-format csi-u

# Enable mouse support
set -g mouse on

# No delay for escape key press
set -sg escape-time 0

# Increase scrollback buffer size
set -g history-limit 50000

# Vim style pane selection (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim style pane selection (without prefix)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Shift arrow to switch windows without prefix
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Kill session with Ctrl+B + q
bind q confirm-before -p "Kill session? (y/n)" kill-session

# Alt+Up/Down to cycle sessions (no prefix needed)
bind -n M-Up   switch-client -p
bind -n M-Down switch-client -n

# Fuzzy session switcher with prefix + f (centered popup)
bind -n M-s display-popup -E -w 60% -h 60% \
  "tmux list-sessions -F '#{session_name}: #{session_windows} windows' | \
   fzf --reverse --border --prompt='Switch to session: ' | \
   cut -d':' -f1 | \
   xargs tmux switch-client -t"
